<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlockProject</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@jaames/iro@5"></script>
</head>
<body>
    <h1>BlockProject</h1>
    <p>Find your perfect block palette and gradients!</p>
    <div class="start">
        <div class="color-block">
            <div id="picker"></div>
            <div id="color-indicator" class="color-indicator"></div>
            <img id="bloco-img" class="imgPreview" src="" draggable="true">
        </div>
        <div class="paleta">
            <div class="gridbox">
                <div class="box"></div>
                <div class="box"></div>
                <div class="box"></div>
                <div class="box"></div>
                <div class="box"></div>
                <div class="box"></div>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
